name: IndexNow Ping

on:
  push:
    branches: [main]

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Wait for Netlify deploy
        run: sleep 60

      - name: Submit URLs to IndexNow
        run: |
          URLS=$(grep -oP '(?<=<loc>)[^<]+' sitemap.xml | jq -R . | jq -s .)
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{
              \"host\": \"kleinkind-welt.de\",
              \"key\": \"b1b3ada26d084bc2a00d4261e977f4e1\",
              \"keyLocation\": \"https://kleinkind-welt.de/b1b3ada26d084bc2a00d4261e977f4e1.txt\",
              \"urlList\": $URLS
            }" \
            -w "\nHTTP %{http_code}"
