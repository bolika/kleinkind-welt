name: SEO and editorial quality gates

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: seo-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  local-quality:
    name: Local content and SEO gates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Validate JavaScript syntax
        run: |
          node --check js/affiliate-tracking.js
          node --check js/faq-accordion.js
          node --check tools/build-kinderwagen-guides.mjs
          node --check tools/content-brief-gate.mjs
          node --check tools/generate-seal-assets.mjs
          node --check tools/internal-link-audit.mjs
          node --check tools/kinderwagen-media-rights-gate.mjs
          node --check tools/seo-smoke-test.mjs
          node --check tools/site-positioning-gate.mjs
          node --check tools/sync-site-navigation.mjs

      - name: Validate GSC monitoring script syntax
        run: python3 -c 'from pathlib import Path; compile(Path("tools/gsc-growth-snapshot.py").read_text(), "tools/gsc-growth-snapshot.py", "exec")'

      - name: Validate structured editorial data
        run: |
          jq empty data/editorial-evidence.json
          jq empty data/content-brief.schema.json
          jq empty data/kinderwagen-guides.v0.1.json
          jq empty data/kinderwagen-navigator/media.schema.json
          jq empty data/kinderwagen-navigator/media.v0.1.json
          jq empty data/spielzeug-siegel.json
          jq empty data/seo-monitoring-config.json
          jq empty content-briefs/*.json

      - name: Validate AI publishing inputs and generated assets
        run: |
          node tools/build-kinderwagen-guides.mjs --check
          node tools/content-brief-gate.mjs
          node tools/generate-seal-assets.mjs --check
          node tools/kinderwagen-media-rights-gate.mjs
          node tools/site-positioning-gate.mjs
          node tools/sync-site-navigation.mjs --check

      - name: Run local SEO smoke test
        run: |
          node tools/seo-smoke-test.mjs --local
          node tools/internal-link-audit.mjs

  live-quality:
    name: Daily production smoke test
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: local-quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Validate production routes and redirects
        run: node tools/seo-smoke-test.mjs --base-url=https://kleinkind-welt.de

      - name: Confirm noindex header for internal docs
        run: |
          curl --fail --silent --show-error --head https://kleinkind-welt.de/docs/integrations/brevo-doi-template.html | grep -i "^x-robots-tag: noindex, nofollow"
